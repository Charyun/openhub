name = "openhub"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[[d1_databases]]
binding = "DB"
database_name = "openhub"
database_id = "PLACEHOLDER_REPLACE_WITH_D1_ID"

[[r2_buckets]]
binding = "R2"
bucket_name = "openhub-assets"
